name: Update Macro Tracker

on:
  schedule:
    - cron: "0 0 * * *"  # Every day at 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run macro tracker
        run: python macro_tracker_updater.py --config config.json

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: macro-tracker-output
          path: |
            output/
            macro_tracker.xlsx
          if-no-files-found: warn

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/ macro_tracker.xlsx manual_data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update macro tracker outputs"
            git push
          fi
